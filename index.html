<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A320neo Normal Checklist — RealFlight Network</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #080c12;
  --surface:     #0d1219;
  --surface-2:   #111820;
  --border:      #1a2535;
  --border-2:    #243040;

  --amber:       #f0a820;
  --amber-soft:  #c8891a;
  --amber-dim:   rgba(240,168,32,0.1);
  --amber-glow:  rgba(240,168,32,0.06);

  --green:       #10c97a;
  --green-dim:   rgba(16,201,122,0.1);
  --green-glow:  rgba(16,201,122,0.05);

  --cyan:        #18c8e0;
  --cyan-dim:    rgba(24,200,224,0.07);

  --red:         #e04040;
  --red-dim:     rgba(224,64,64,0.07);

  --text-primary:   #dce8f4;
  --text-secondary: #7a95aa;
  --text-muted:     #3d5568;

  --sans: 'Inter', system-ui, sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --radius: 6px;
  --radius-sm: 4px;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text-primary);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse 80% 40% at 50% -5%, rgba(240,168,32,0.05) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* ── HEADER ── */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(8,12,18,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.header-inner {
  max-width: 1160px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  height: 64px; padding: 0 32px; gap: 24px;
}
.header-brand { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.brand-icon {
  width: 36px; height: 36px;
  background: var(--amber-dim);
  border: 1px solid rgba(240,168,32,0.2);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
}
.brand-title { font-size: 16px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.01em; line-height: 1.1; }
.brand-title span { color: var(--amber); }
.brand-sub { font-size: 10px; font-family: var(--mono); color: var(--text-muted); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 2px; }
.header-center { flex: 1; max-width: 380px; display: flex; align-items: center; gap: 12px; }
.progress-track { flex: 1; height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--amber-soft), var(--green)); border-radius: 99px; transition: width 0.3s ease; }
.progress-text { font-family: var(--mono); font-size: 11px; color: var(--text-secondary); white-space: nowrap; min-width: 56px; text-align: right; }
.sim-badge {
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--red); background: var(--red-dim); border: 1px solid rgba(224,64,64,0.18);
  border-radius: var(--radius-sm); padding: 4px 10px; flex-shrink: 0;
}

/* ── PAGE ── */
.page {
  position: relative; z-index: 1;
  max-width: 1160px; margin: 0 auto;
  padding: 28px 32px 100px;
  display: grid; grid-template-columns: 190px 1fr; gap: 24px; align-items: start;
}

/* ── SIDEBAR ── */
.sidebar {
  position: sticky; top: 80px;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;
}
.sidebar-title {
  padding: 10px 14px; font-family: var(--mono); font-size: 9px;
  letter-spacing: 0.18em; text-transform: uppercase; color: var(--amber);
  border-bottom: 1px solid var(--border); background: var(--surface-2);
}
.nav-item {
  display: flex; align-items: center; gap: 9px;
  padding: 9px 14px; font-size: 12px; font-weight: 500;
  color: var(--text-secondary); cursor: pointer;
  border-bottom: 1px solid var(--border); border-left: 2px solid transparent;
  transition: color 0.15s, background 0.15s, border-color 0.15s; user-select: none;
}
.nav-item:last-child { border-bottom: none; }
.nav-item:hover { color: var(--text-primary); background: var(--amber-glow); border-left-color: rgba(240,168,32,0.35); }
.nav-item.complete { color: var(--green); background: var(--green-glow); border-left-color: rgba(16,201,122,0.4); }
.nav-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border-2); flex-shrink: 0; transition: background 0.2s; }
.nav-item.complete .nav-dot { background: var(--green); }
.nav-label { flex: 1; }
.nav-count { font-family: var(--mono); font-size: 10px; color: var(--text-muted); }
.nav-item.complete .nav-count { color: rgba(16,201,122,0.6); }

/* ── MAIN ── */
.main { display: flex; flex-direction: column; gap: 14px; }

/* ── SECTION CARD ── */
.section {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  overflow: hidden; transition: border-color 0.25s;
}
.section.complete { border-color: rgba(16,201,122,0.22); }

.section-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 13px 18px; cursor: pointer; user-select: none;
  border-bottom: 1px solid var(--border); transition: background 0.15s;
}
.section-head:hover { background: rgba(255,255,255,0.012); }
.section.complete .section-head { border-bottom-color: rgba(16,201,122,0.12); }

.head-left { display: flex; align-items: center; gap: 12px; }

.phase-pill {
  font-family: var(--mono); font-size: 10px; font-weight: 500;
  color: var(--amber-soft); background: var(--amber-dim);
  border: 1px solid rgba(240,168,32,0.14); border-radius: var(--radius-sm);
  padding: 2px 9px; flex-shrink: 0; letter-spacing: 0.04em;
  transition: all 0.2s;
}
.section.complete .phase-pill { color: var(--green); background: var(--green-dim); border-color: rgba(16,201,122,0.18); }

.section-title { font-size: 14px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.01em; }

.head-right { display: flex; align-items: center; gap: 9px; }

.section-badge {
  font-family: var(--mono); font-size: 10px; color: var(--text-muted);
  background: var(--surface-2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 2px 9px; transition: all 0.2s;
}
.section-badge.done { color: var(--green); background: var(--green-dim); border-color: rgba(16,201,122,0.18); }

.reset-btn {
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-muted); background: none; border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 3px 9px; cursor: pointer; transition: all 0.15s;
}
.reset-btn:hover { color: var(--amber); border-color: rgba(240,168,32,0.35); }

.chevron { width: 15px; height: 15px; color: var(--text-muted); transition: transform 0.2s; flex-shrink: 0; }
.section.collapsed .chevron { transform: rotate(-90deg); }

/* ── ITEMS BODY ── */
.items-body { }
.section.collapsed .items-body { display: none; }

/* Phase sub-label */
.phase-lbl {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 18px 5px;
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--text-muted);
}
.phase-lbl::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* Row */
.item {
  display: flex; align-items: center; gap: 13px;
  padding: 0 18px; min-height: 46px;
  border-bottom: 1px solid rgba(26,37,53,0.5);
  cursor: pointer; transition: background 0.12s;
}
.item:last-child { border-bottom: none; }
.item:hover { background: rgba(240,168,32,0.025); }
.item.checked { background: rgba(16,201,122,0.025); }
.item.checked:hover { background: rgba(16,201,122,0.045); }

/* Warning row */
.item.is-warn { border-left: 2px solid rgba(224,64,64,0.4); background: var(--red-dim); }
.item.is-warn:hover { background: rgba(224,64,64,0.06); }

/* Note row */
.item.is-note {
  cursor: default; min-height: auto; padding: 9px 18px 9px 38px;
  background: var(--cyan-dim); border-left: 2px solid rgba(24,200,224,0.18);
  border-bottom: 1px solid rgba(26,37,53,0.4);
}
.item.is-note:hover { background: var(--cyan-dim); }

/* Checkbox */
.cb {
  width: 17px; height: 17px; min-width: 17px;
  border: 1.5px solid var(--border-2); border-radius: 3px;
  background: var(--surface-2); display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; flex-shrink: 0;
}
.item.checked .cb { background: var(--green); border-color: var(--green); }
.item.is-warn .cb { border-color: rgba(224,64,64,0.35); }
.cb-tick { display: none; }
.item.checked .cb-tick { display: block; }

/* Text */
.item-text {
  flex: 1; font-size: 13.5px; font-weight: 500;
  color: var(--text-primary); padding: 12px 0; line-height: 1.4;
  transition: color 0.15s;
}
.item.checked .item-text { color: var(--text-muted); text-decoration: line-through; text-decoration-color: rgba(16,201,122,0.25); }
.item.is-warn .item-text { color: rgba(230,80,80,0.9); font-size: 13px; }
.item.is-note .item-text { font-family: var(--mono); font-size: 11.5px; color: rgba(24,200,224,0.7); font-weight: 400; padding: 0; }

/* Value */
.item-val {
  font-family: var(--mono); font-size: 12px; font-weight: 500;
  color: var(--amber); text-align: right; padding: 12px 0 12px 10px;
  min-width: 100px; max-width: 210px; line-height: 1.35; word-break: break-word;
  transition: color 0.15s;
}
.item.checked .item-val { color: var(--text-muted); }
.item.is-warn .item-val { color: rgba(224,64,64,0.6); }

.warn-ico { flex-shrink: 0; font-size: 13px; }

/* ── DONE BANNER ── */
.done-banner {
  display: none; text-align: center;
  padding: 48px 32px; background: var(--green-glow);
  border: 1px solid rgba(16,201,122,0.18); border-radius: var(--radius);
}
.done-banner.visible { display: block; }
.done-banner h2 { font-size: 20px; font-weight: 700; color: var(--green); margin-bottom: 6px; letter-spacing: -0.01em; }
.done-banner p { font-family: var(--mono); font-size: 10px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; }

/* ── RESPONSIVE ── */
@media (max-width: 700px) {
  .page { grid-template-columns: 1fr; padding: 16px 16px 80px; }
  .sidebar { display: none; }
  .header-inner { padding: 0 16px; }
  .sim-badge { display: none; }
  .header-center { max-width: 180px; }
}
</style>
</head>

// ── BUILD ─────────────────────────────────────────────────
const mainEl = document.getElementById('main');
const navEl  = document.getElementById('navList');
let total = 0, done = 0;

const TICK = `<svg class="cb-tick" width="10" height="8" viewBox="0 0 10 8" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1,4 4,7 9,1"/></svg>`;

S.forEach((sec, si) => {
  const checkable = sec.items.filter(i => i.a || i.w).length;

  // Nav
  const nav = document.createElement('div');
  nav.className = 'nav-item';
  nav.id = 'nav-' + sec.id;
  nav.innerHTML = `<div class="nav-dot"></div><span class="nav-label">${sec.t}</span><span class="nav-count" id="nc-${sec.id}">0/${checkable}</span>`;
  nav.onclick = () => document.getElementById(sec.id)?.scrollIntoView({behavior:'smooth',block:'start'});
  navEl.appendChild(nav);

  // Card
  const card = document.createElement('div');
  card.className = 'section';
  card.id = sec.id;
  card.innerHTML = `
    <div class="section-head" onclick="toggleSec('${sec.id}')">
      <div class="head-left">
        <span class="phase-pill" id="pp-${sec.id}">${sec.n} / 17</span>
        <span class="section-title">${sec.t}</span>
      </div>
      <div class="head-right">
        <span class="section-badge" id="badge-${sec.id}">0 / ${checkable}</span>
        <button class="reset-btn" onclick="event.stopPropagation();resetSec('${sec.id}')">Reset</button>
        <svg class="chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="4,6 8,10 12,6"/></svg>
      </div>
    </div>
    <div class="items-body" id="body-${sec.id}"></div>`;

  const body = card.querySelector('.items-body');

  sec.items.forEach((item, ii) => {
    if (item.p) {
      const d = document.createElement('div');
      d.className = 'phase-lbl';
      d.textContent = item.p;
      body.appendChild(d); return;
    }
    if (item.i) {
      const d = document.createElement('div');
      d.className = 'item is-note';
      d.innerHTML = `<div class="item-text">${item.i}</div>`;
      body.appendChild(d); return;
    }
    if (item.w) {
      const d = document.createElement('div');
      d.className = 'item is-warn';
      d.dataset.sec = sec.id;
      d.onclick = () => toggleItem(d);
      d.innerHTML = `<div class="cb">${TICK}</div><span class="warn-ico">⚠</span><div class="item-text">${item.w}</div>`;
      body.appendChild(d); total++; return;
    }
    const d = document.createElement('div');
    d.className = 'item';
    d.dataset.sec = sec.id;
    d.onclick = () => toggleItem(d);
    d.innerHTML = `<div class="cb">${TICK}</div><div class="item-text">${item.a}</div><div class="item-val">${item.v||''}</div>`;
    body.appendChild(d); total++;
  });

  mainEl.insertBefore(card, document.getElementById('doneBanner'));
});

updateProgress();

// ── LOGIC ─────────────────────────────────────────────────
function toggleItem(el) {
  const was = el.classList.contains('checked');
  el.classList.toggle('checked');
  was ? done-- : done++;
  updateProgress();
  refreshSection(el.dataset.sec);
}

function toggleSec(id) { document.getElementById(id).classList.toggle('collapsed'); }

function resetSec(id) {
  document.querySelectorAll(`[data-sec="${id}"]`).forEach(el => {
    if (el.classList.contains('checked')) { el.classList.remove('checked'); done--; }
  });
  updateProgress(); refreshSection(id);
}

function refreshSection(id) {
  const all = [...document.querySelectorAll(`[data-sec="${id}"]`)];
  const chk = all.filter(e => e.classList.contains('checked')).length;
  const cnt = all.length;
  const full = cnt > 0 && chk === cnt;

  document.getElementById('badge-'+id).textContent = `${chk} / ${cnt}`;
  document.getElementById('badge-'+id).className = 'section-badge' + (full ? ' done' : '');
  document.getElementById('nc-'+id).textContent = `${chk}/${cnt}`;
  document.getElementById(id).classList.toggle('complete', full);
  document.getElementById('nav-'+id).classList.toggle('complete', full);
}

function updateProgress() {
  const pct = total > 0 ? (done / total * 100) : 0;
  document.getElementById('pFill').style.width = pct + '%';
  document.getElementById('pText').textContent = `${done} / ${total}`;
  document.getElementById('doneBanner').classList.toggle('visible', done === total && total > 0);
}
</script>
